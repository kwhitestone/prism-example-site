# Prism Example Site 服务编排
# 使用方式: docker-compose up -d
# 从项目根目录构建

services:
  # ============================================================
  # Prism Example Site - 主应用
  # ============================================================
  prism-example-site:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: prism-example-site
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3380}:3380"
    environment:
      GATEWAY_PORT: "${GATEWAY_PORT:-3380}"
      # 数据库配置
      DB_HOST: "${DB_HOST:-}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME:-prism_example_site}"
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
    networks:
      - prism-net

networks:
  prism-net:
    driver: bridge
